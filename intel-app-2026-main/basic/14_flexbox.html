<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        background-color: gold;
        width: 100px;
        height: 100px;
        border: 1px solid black;
      }
      .container {
        display: flex;
        flex-direction: row /*column*/ /*-reverse*/;
        background-color: tomato;
        padding: 5px;
        height: 300px;
        width: 500px;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .centertext {
        text-align: center;
        align-content: center;
      }
      .box1 {
        flex: 3;
      }
      .box2 {
        flex: 1;
      }
      .box3 {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box1 centertext">box1</div>
      <div class="box box2 centertext">box2</div>
      <div class="box box3 centertext">box3</div>
    </div>
  </body>
</html>
