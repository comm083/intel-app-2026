<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네비게이션</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .navbar {
        background-color: gold;
        display: flex;
        gap: 30px;
        padding: 20px;
      }
      .nav-menu {
        display: flex;
        list-style: none;
        gap: 10px;
      }
      .nav-menu a {
        text-decoration: none;
      }
      .nav-menu a:hover {
        color: red;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">MyBrand</div>
      <ul class="nav-menu">
        <li><a href="#">홈</a></li>
        <li><a href="#">서비스</a></li>
        <li><a href="#">포트폴리오</a></li>
        <li><a href="#">문의하기</a></li>
      </ul>
    </nav>
  </body>
</html>
